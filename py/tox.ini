[tox]
minversion = 4.26
requires =
    tox-uv-bare>=1.35.2
envlist = lint, format, py312, qa
skipsdist = true

[testenv]
description = Run Python test suite
runner = uv-venv-lock-runner
basepython = python3.12
dependency_groups =
    dev

[testenv:py312]
basepython = python3.12
commands =
    python -m pytest tests {posargs}

[testenv:lint]
description = Run Ruff lint checks
commands =
    ruff check medorg tests

[testenv:format]
description = Run Ruff format checks
commands =
    ruff format --check medorg tests

[testenv:qa]
description = Run lint, format, and tests together
commands =
    ruff check medorg tests
    ruff format --check medorg tests
    python -m pytest tests
