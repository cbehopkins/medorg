[tox]
minversion = 4.26
envlist = lint, format, py312, qa
skipsdist = true

[testenv]
description = Run Python test suite
package = skip
set_env =
    VIRTUALENV_OVERRIDE_APP_DATA = {tox_root}{/}.virtualenv-app-data
deps =
    pytest==8.3.5
    pytest-asyncio==0.23.5
    click==8.2.0
    aiofiles==23.2.1
    aiopath==0.7.7
    lxml==5.0.0
    SQLAlchemy==2.0.25
    aiosqlite==0.20.0
    rich==13.9.4
    greenlet==3.2.2
    InquirerPy==0.3.4
commands =
    python -m pytest tests

[testenv:py312]
basepython = python3.12

[testenv:lint]
description = Run Ruff lint checks
package = skip
deps =
    ruff==0.11.13
commands =
    python -m ruff check medorg tests

[testenv:format]
description = Run Ruff format checks
package = skip
deps =
    ruff==0.11.13
commands =
    python -m ruff format --check medorg tests

[testenv:qa]
description = Run lint, format, and tests together
package = skip
deps =
    {[testenv]deps}
    {[testenv:lint]deps}
commands =
    python -m ruff check medorg tests
    python -m ruff format --check medorg tests
    python -m pytest tests
